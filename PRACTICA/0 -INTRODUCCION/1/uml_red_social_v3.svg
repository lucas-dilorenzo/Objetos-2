<svg width="100%" viewBox="0 0 730 660" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="inherit" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="12" markerHeight="12" orient="auto-start-reverse">
      <path d="M1 1L10 6L1 11Z" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- ===== RedSocial (top-left, purple) ===== -->
  <g style="fill:rgb(0,0,0);stroke:none;color:rgb(255,255,255);font-family:-apple-system,system-ui,sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">
    <rect x="20" y="20" width="250" height="128" rx="4" stroke-width="0.5" style="fill:rgb(60,52,137);stroke:rgb(175,169,236)"/>
    <text x="145" y="40" text-anchor="middle" dominant-baseline="central" style="fill:rgb(206,203,246);font-size:14px;font-weight:500;stroke:none">RedSocial</text>
    <line x1="20" y1="52" x2="270" y2="52" stroke="white" stroke-width="0.5" opacity="0.4"/>
    <text x="145" y="66" text-anchor="middle" dominant-baseline="central" style="fill:rgb(175,169,236);font-size:12px;stroke:none">-usuarios: Map&lt;String, Usuario&gt;</text>
    <line x1="20" y1="80" x2="270" y2="80" stroke="white" stroke-width="0.5" opacity="0.4"/>
    <text x="145" y="94" text-anchor="middle" dominant-baseline="central" style="fill:rgb(175,169,236);font-size:12px;stroke:none">+agregarUsuario(userName: String)</text>
    <text x="145" y="110" text-anchor="middle" dominant-baseline="central" style="fill:rgb(175,169,236);font-size:12px;stroke:none">+eliminarUsuario(userName: String)</text>
    <text x="145" y="126" text-anchor="middle" dominant-baseline="central" style="fill:rgb(175,169,236);font-size:12px;stroke:none">+getUsuario(userName: String)</text>
  </g>

  <!-- ===== Publicacion — abstract (top-right, purple) ===== -->
  <g style="fill:rgb(0,0,0);stroke:none;color:rgb(255,255,255);font-family:-apple-system,system-ui,sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">
    <rect x="380" y="20" width="320" height="108" rx="4" stroke-width="0.5" style="fill:rgb(60,52,137);stroke:rgb(175,169,236)"/>
    <rect x="380" y="20" width="320" height="22" rx="4" stroke-width="0" style="fill:rgb(60,52,137)"/>
    <rect x="380" y="20" width="320" height="22" rx="4" stroke-width="0.5" style="fill:rgb(60,52,137);stroke:rgb(175,169,236)"/>
    <text x="540" y="34" text-anchor="middle" dominant-baseline="central" style="fill:rgb(175,169,236);font-size:12px;stroke:none">«abstract»</text>
    <line x1="380" y1="42" x2="700" y2="42" stroke="white" stroke-width="0.5" opacity="0.4"/>
    <text x="540" y="58" text-anchor="middle" dominant-baseline="central" font-style="italic" style="fill:rgb(206,203,246);font-size:14px;font-weight:500;font-style:italic;stroke:none">Publicacion</text>
    <line x1="380" y1="72" x2="700" y2="72" stroke="white" stroke-width="0.5" opacity="0.4"/>
    <text x="540" y="86" text-anchor="middle" dominant-baseline="central" style="fill:rgb(175,169,236);font-size:12px;stroke:none">+getTexto(): String</text>
    <text x="540" y="102" text-anchor="middle" dominant-baseline="central" style="fill:rgb(175,169,236);font-size:12px;stroke:none">+eliminarLasReferenciasDeRetweets()</text>
  </g>

  <!-- RedSocial → Usuario (vertical association) -->
  <line x1="145" y1="148" x2="145" y2="200" stroke="rgb(194,192,182)" stroke-width="0.5" marker-end="url(#arrow)"/>
  <text x="154" y="162" dominant-baseline="central" style="fill:rgb(194,192,182);font-size:12px;font-family:-apple-system,system-ui,sans-serif">1</text>
  <text x="154" y="188" dominant-baseline="central" style="fill:rgb(194,192,182);font-size:12px;font-family:-apple-system,system-ui,sans-serif">0..*</text>
  <text x="74" y="172" dominant-baseline="central" style="fill:rgb(194,192,182);font-size:12px;font-family:-apple-system,system-ui,sans-serif">usuarios</text>

  <!-- ===== Usuario (left, green) ===== -->
  <g style="fill:rgb(0,0,0);stroke:none;color:rgb(255,255,255);font-family:-apple-system,system-ui,sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">
    <rect x="20" y="200" width="270" height="168" rx="4" stroke-width="0.5" style="fill:rgb(8,80,65);stroke:rgb(93,202,165)"/>
    <text x="155" y="218" text-anchor="middle" dominant-baseline="central" style="fill:rgb(159,225,203);font-size:14px;font-weight:500;stroke:none">Usuario</text>
    <line x1="20" y1="230" x2="290" y2="230" stroke="white" stroke-width="0.5" opacity="0.4"/>
    <text x="155" y="244" text-anchor="middle" dominant-baseline="central" style="fill:rgb(93,202,165);font-size:12px;stroke:none">-userName: String</text>
    <text x="155" y="260" text-anchor="middle" dominant-baseline="central" style="fill:rgb(93,202,165);font-size:12px;stroke:none">-publicaciones: List&lt;Publicacion&gt;</text>
    <line x1="20" y1="274" x2="290" y2="274" stroke="white" stroke-width="0.5" opacity="0.4"/>
    <text x="155" y="288" text-anchor="middle" dominant-baseline="central" style="fill:rgb(93,202,165);font-size:12px;stroke:none">+agregarPublicacion(p: Publicacion)</text>
    <text x="155" y="304" text-anchor="middle" dominant-baseline="central" style="fill:rgb(93,202,165);font-size:12px;stroke:none">+getUserName(): String</text>
    <text x="155" y="320" text-anchor="middle" dominant-baseline="central" style="fill:rgb(93,202,165);font-size:12px;stroke:none">+eliminarPublicaciones()</text>
    <text x="155" y="336" text-anchor="middle" dominant-baseline="central" style="fill:rgb(93,202,165);font-size:12px;stroke:none">+cantidadPublicaciones(): int</text>
  </g>

  <!-- Usuario → Publicacion (association, L-bend through center corridor) -->
  <path d="M 290 260 L 362 260 L 362 58 L 380 58" fill="none" stroke="rgb(194,192,182)" stroke-width="0.5" marker-end="url(#arrow)"/>
  <text x="300" y="252" dominant-baseline="central" style="fill:rgb(194,192,182);font-size:12px;font-family:-apple-system,system-ui,sans-serif">0..*</text>
  <text x="305" y="218" dominant-baseline="central" style="fill:rgb(194,192,182);font-size:12px;font-family:-apple-system,system-ui,sans-serif">publicaciones</text>

  <!-- Tweet extends Publicacion (dashed inheritance, straight up) -->
  <line x1="540" y1="168" x2="540" y2="128" stroke="rgb(194,192,182)" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#inherit)"/>

  <!-- ===== Tweet (right-middle, blue) ===== -->
  <g style="fill:rgb(0,0,0);stroke:none;color:rgb(255,255,255);font-family:-apple-system,system-ui,sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">
    <rect x="380" y="168" width="320" height="196" rx="4" stroke-width="0.5" style="fill:rgb(12,68,124);stroke:rgb(133,183,235)"/>
    <text x="540" y="186" text-anchor="middle" dominant-baseline="central" style="fill:rgb(181,212,244);font-size:14px;font-weight:500;stroke:none">Tweet</text>
    <line x1="380" y1="198" x2="700" y2="198" stroke="white" stroke-width="0.5" opacity="0.4"/>
    <text x="540" y="212" text-anchor="middle" dominant-baseline="central" style="fill:rgb(133,183,235);font-size:12px;stroke:none">-texto: String [1..280]</text>
    <text x="540" y="228" text-anchor="middle" dominant-baseline="central" style="fill:rgb(133,183,235);font-size:12px;stroke:none">-retweets: List&lt;Retweet&gt;</text>
    <line x1="380" y1="242" x2="700" y2="242" stroke="white" stroke-width="0.5" opacity="0.4"/>
    <text x="540" y="256" text-anchor="middle" dominant-baseline="central" style="fill:rgb(133,183,235);font-size:12px;stroke:none">+Tweet(texto: String)</text>
    <text x="540" y="272" text-anchor="middle" dominant-baseline="central" style="fill:rgb(133,183,235);font-size:12px;stroke:none">+agregarRetweet(r: Retweet)</text>
    <text x="540" y="288" text-anchor="middle" dominant-baseline="central" style="fill:rgb(133,183,235);font-size:12px;stroke:none">+getTexto(): String</text>
    <text x="540" y="304" text-anchor="middle" dominant-baseline="central" style="fill:rgb(133,183,235);font-size:12px;stroke:none">+eliminarLasReferenciasDeRetweets()</text>
    <text x="540" y="320" text-anchor="middle" dominant-baseline="central" style="fill:rgb(133,183,235);font-size:12px;stroke:none">+cantidadDeRetweets(): int</text>
  </g>

  <!-- Retweet extends Publicacion (dashed inheritance, right corridor) -->
  <path d="M 700 500 L 718 500 L 718 58 L 700 58" fill="none" stroke="rgb(194,192,182)" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#inherit)"/>

  <!-- Retweet → Tweet (dashed reference, left corridor) -->
  <path d="M 380 480 L 350 480 L 350 270 L 380 270" fill="none" stroke="rgb(194,192,182)" stroke-width="0.5" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
  <text x="352" y="398" dominant-baseline="central" style="fill:rgb(194,192,182);font-size:12px;font-family:-apple-system,system-ui,sans-serif">tweet</text>

  <!-- ===== Retweet (right-bottom, orange) ===== -->
  <g style="fill:rgb(0,0,0);stroke:none;color:rgb(255,255,255);font-family:-apple-system,system-ui,sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">
    <rect x="380" y="408" width="320" height="180" rx="4" stroke-width="0.5" style="fill:rgb(113,43,19);stroke:rgb(240,153,123)"/>
    <text x="540" y="426" text-anchor="middle" dominant-baseline="central" style="fill:rgb(245,196,179);font-size:14px;font-weight:500;stroke:none">Retweet</text>
    <line x1="380" y1="438" x2="700" y2="438" stroke="white" stroke-width="0.5" opacity="0.4"/>
    <text x="540" y="452" text-anchor="middle" dominant-baseline="central" style="fill:rgb(240,153,123);font-size:12px;stroke:none">-tweet: Tweet</text>
    <line x1="380" y1="466" x2="700" y2="466" stroke="white" stroke-width="0.5" opacity="0.4"/>
    <text x="540" y="480" text-anchor="middle" dominant-baseline="central" style="fill:rgb(240,153,123);font-size:12px;stroke:none">+Retweet(tweet: Tweet)</text>
    <text x="540" y="496" text-anchor="middle" dominant-baseline="central" style="fill:rgb(240,153,123);font-size:12px;stroke:none">+eliminar()</text>
    <text x="540" y="512" text-anchor="middle" dominant-baseline="central" style="fill:rgb(240,153,123);font-size:12px;stroke:none">+getTexto(): String</text>
    <text x="540" y="528" text-anchor="middle" dominant-baseline="central" style="fill:rgb(240,153,123);font-size:12px;stroke:none">+eliminarLasReferenciasDeRetweets()</text>
    <text x="540" y="544" text-anchor="middle" dominant-baseline="central" style="fill:rgb(240,153,123);font-size:12px;stroke:none">+tieneTweetOriginal(): boolean</text>
  </g>

  <!-- Leyenda -->
  <line x1="30" y1="624" x2="70" y2="624" stroke="rgb(194,192,182)" stroke-width="0.5" marker-end="url(#arrow)" style="fill:none"/>
  <text x="78" y="628" dominant-baseline="central" style="fill:rgb(194,192,182);font-size:12px;font-family:-apple-system,system-ui,sans-serif">asociación</text>
  <line x1="200" y1="624" x2="240" y2="624" stroke="rgb(194,192,182)" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#inherit)" style="fill:none"/>
  <text x="248" y="628" dominant-baseline="central" style="fill:rgb(194,192,182);font-size:12px;font-family:-apple-system,system-ui,sans-serif">herencia</text>
  <line x1="370" y1="624" x2="410" y2="624" stroke="rgb(194,192,182)" stroke-width="0.5" stroke-dasharray="5 3" marker-end="url(#arrow)" style="fill:none"/>
  <text x="418" y="628" dominant-baseline="central" style="fill:rgb(194,192,182);font-size:12px;font-family:-apple-system,system-ui,sans-serif">referencia</text>
</svg>
